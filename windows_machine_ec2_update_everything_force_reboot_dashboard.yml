# ==========================================================
# Full Windows Update Installer + Force Reboot + Dashboard Teams Alert
# Includes:
#  Install All Updates (Two Passes)
#  Force Final Reboot
#  Dashboard-Style Teams Notification
#  Color-Coded SUCCESS / FAILURE
#  Weekly Auto-Schedule (Sunday @ 2 AM)
#  IT-Friendly Headings
# ==========================================================

---
- name: Install ALL Windows updates and FORCE reboot
  hosts: windows
  gather_facts: yes

  vars:
    update_source: windows_update
    reboot_timeout: 1800
    post_reboot_delay: 30

    teams_webhook: "https://ardent365.webhook.office.com/webhookb2/778d27bf-3424-47f5-8dc9-1007a44345b6@513ad1e8-5532-4f6b-ada4-1b55e6560288/IncomingWebhook/7ceef668663a45f9a759656d3a8b009d/8692370d-a030-46a6-bd7f-0c40bb8d77a0/V2vfUkJN88_KBy6VYUSkqmHEW7xhNTxnlT66biiy1411I1"

  tasks:

    # ------------------------------------------------------
    # PASS 1
    # ------------------------------------------------------
    - name: Install ALL updates (Pass 1)
      ansible.windows.win_updates:
        state: installed
        server_selection: "{{ update_source }}"
        accept_list:
          - "*"
        reboot: no
      register: p1

    - name: Reboot if required (Pass 1)
      ansible.windows.win_reboot:
        reboot_timeout: "{{ reboot_timeout }}"
        post_reboot_delay: "{{ post_reboot_delay }}"
      when: p1.reboot_required | default(false)

    # ------------------------------------------------------
    # PASS 2
    # ------------------------------------------------------
    - name: Install ALL updates (Pass 2)
      ansible.windows.win_updates:
        state: installed
        server_selection: "{{ update_source }}"
        accept_list:
          - "*"
        reboot: no
      register: p2

    - name: Reboot if required (Pass 2)
      ansible.windows.win_reboot:
        reboot_timeout: "{{ reboot_timeout }}"
        post_reboot_delay: "{{ post_reboot_delay }}"
      when: p2.reboot_required | default(false)

    # ------------------------------------------------------
    # FINAL FORCED REBOOT
    # ------------------------------------------------------
    - name: FORCE reboot even if no update required it
      ansible.windows.win_reboot:
        msg: "Mandatory reboot after full system update"
        reboot_timeout: "{{ reboot_timeout }}"
        post_reboot_delay: "{{ post_reboot_delay }}"
      register: final_reboot

    # ------------------------------------------------------
    # DETERMINE SUCCESS / FAILURE
    # ------------------------------------------------------
    - name: Determine update status
      set_fact:
        update_status: "{{ ' SUCCESS  Updates Installed Successfully' if (p1.failed == false and p2.failed == false) else ' FAILED  Errors Occurred During Update' }}"
        status_color: "{{ 'Good' if (p1.failed == false and p2.failed == false) else 'Attention' }}"

    # ------------------------------------------------------
    # TEAMS DASHBOARD ADAPTIVE CARD
    # ------------------------------------------------------
    - name: Send Dashboard-Style Teams Card
      uri:
        url: "{{ teams_webhook }}"
        method: POST
        headers:
          Content-Type: "application/json"
        body_format: json
        body: |
          {
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.5",
                  "body": [

                    {
                      "type": "TextBlock",
                      "text": " Windows Update & Forced Reboot Report",
                      "size": "Large",
                      "weight": "Bolder",
                      "color": "Accent"
                    },
                    {
                      "type": "TextBlock",
                      "text": "Full Update + Forced Reboot Summary",
                      "spacing": "None"
                    },

                    {
                      "type": "ColumnSet",
                      "columns": [
                        {
                          "type": "Column",
                          "width": "stretch",
                          "items": [
                            { "type": "TextBlock", "text": "Server", "weight": "Bolder" },
                            { "type": "TextBlock", "text": "{{ inventory_hostname }}" }
                          ]
                        },
                        {
                          "type": "Column",
                          "width": "stretch",
                          "items": [
                            { "type": "TextBlock", "text": "Timestamp", "weight": "Bolder" },
                            { "type": "TextBlock", "text": "{{ ansible_date_time.iso8601 }}", "wrap": true }
                          ]
                        }
                      ]
                    },

                    {
                      "type": "Container",
                      "items": [
                        { "type": "TextBlock", "text": " Status Overview", "weight": "Bolder", "size": "Medium" },
                        {
                          "type": "Container",
                          "style": "emphasis",
                          "items": [
                            { "type": "TextBlock", "text": "{{ update_status }}", "weight": "Bolder", "color": "{{ status_color }}" }
                          ],
                          "padding": "Medium"
                        }
                      ]
                    },

                    {
                      "type": "TextBlock",
                      "text": " Update Metrics",
                      "weight": "Bolder",
                      "size": "Medium"
                    },

                    {
                      "type": "ColumnSet",
                      "columns": [
                        {
                          "type": "Column",
                          "items": [
                            {
                              "type": "Container",
                              "items": [
                                { "type": "TextBlock", "text": "Initial Pass", "weight": "Bolder" },
                                { "type": "TextBlock", "text": "{{ p1.updates | default([]) | length }}", "size": "Large", "color": "Accent", "weight": "Bolder" }
                              ],
                              "padding": "Medium"
                            }
                          ]
                        },
                        {
                          "type": "Column",
                          "items": [
                            {
                              "type": "Container",
                              "items": [
                                { "type": "TextBlock", "text": "Secondary Pass", "weight": "Bolder" },
                                { "type": "TextBlock", "text": "{{ p2.updates | default([]) | length }}", "size": "Large", "color": "Accent", "weight": "Bolder" }
                              ],
                              "padding": "Medium"
                            }
                          ]
                        },
                        {
                          "type": "Column",
                          "items": [
                            {
                              "type": "Container",
                              "items": [
                                { "type": "TextBlock", "text": "Reboot", "weight": "Bolder" },
                                { "type": "TextBlock", "text": " Completed", "size": "Large", "color": "Good", "weight": "Bolder" }
                              ],
                              "padding": "Medium"
                            }
                          ]
                        }
                      ]
                    },

                    {
                      "type": "TextBlock",
                      "text": " Initial Update Pass Details",
                      "weight": "Bolder",
                      "size": "Medium"
                    },
                    {
                      "type": "TextBlock",
                      "text": "{{ p1.updates | default([]) }}",
                      "wrap": true
                    },

                    {
                      "type": "TextBlock",
                      "text": " Secondary Update Pass Details",
                      "weight": "Bolder",
                      "size": "Medium"
                    },
                    {
                      "type": "TextBlock",
                      "text": "{{ p2.updates | default([]) }}",
                      "wrap": true
                    }

                  ]
                }
              }
            ]
          }
      delegate_to: localhost

    # ------------------------------------------------------
    # WEEKLY SCHEDULED TASK
    # ------------------------------------------------------
    - name: Prepare folder for schedule script
      win_file:
        path: "C:\\ProgramData\\Ansible"
        state: directory

    - name: Create scheduled task wrapper script
      win_copy:
        dest: "C:\\ProgramData\\Ansible\\update_script.ps1"
        content: |
          ansible-playbook C:\ProgramData\Ansible\update-everything-force-reboot-dashboard.yml

    - name: Schedule weekly full update task (Sunday 2 AM)
      win_scheduled_task:
        name: "Weekly_Windows_Update_Full"
        description: "Weekly auto Windows update + forced reboot"
        actions:
          - path: powershell.exe
            arguments: "-ExecutionPolicy Bypass -File C:\\ProgramData\\Ansible\\update_script.ps1"
        triggers:
          - type: weekly
            days_of_week:
              - Sunday
            start_boundary: "2026-03-29T02:00:00"
        username: "SYSTEM"
        state: present
