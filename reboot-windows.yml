---
- name: Reboot Windows servers
  hosts: windows
  gather_facts: no
  become: no

  vars:
    # Optional: how long to wait (seconds) for the host to shut down and come back
    reboot_timeout: 1200
    shutdown_timeout: 600
    connect_timeout: 30

  tasks:
    - name: Initiate safe reboot and wait for the host to return
    # win_reboot takes care of rebooting, disconnecting, and waiting until WinRM is back
      ansible.windows.win_reboot:
        reboot_timeout: "{{ reboot_timeout }}"
        shutdown_timeout: "{{ shutdown_timeout }}"
        connect_timeout: "{{ connect_timeout }}"
        post_reboot_delay: 30
        pre_reboot_delay: 5
